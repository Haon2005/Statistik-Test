format:
  html:
    code-fold: false
    code-line-numbers: false
    code-link: true
    code-summary: "Code anzeigen"
    code-tools: true
    highlight-style: github
    html-math-method: katex
    number-sections: false
    toc: true
    lang: de
    theme:
      light: [morph, Theme/morph_custom.scss]
      dark: [slate, Theme/slate_custom.scss]
    respect-user-color-scheme: true
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    include-after-body:
      - text: |
          <script>
          document.addEventListener("DOMContentLoaded", function () {
            var sidebar = document.getElementById("quarto-sidebar");
            if (!sidebar) return;
            var navContainer = sidebar.querySelector(".sidebar-menu-container");
            if (!navContainer) return;
            var expanded = false;
            var btn = document.createElement("button");
            btn.id = "sidebar-toggle-all";
            btn.textContent = "\u25bc Alle ausklappen";
            btn.style.cssText = "display:block;width:calc(100% - 24px);margin:12px 12px 6px;padding:5px 10px;font-size:0.78em;cursor:pointer;border:1px solid rgba(128,128,128,0.3);border-radius:4px;background:transparent;color:inherit;opacity:0.65;text-align:center;";
            btn.addEventListener("mouseenter", function () { btn.style.opacity = "1"; });
            btn.addEventListener("mouseleave", function () { btn.style.opacity = "0.65"; });
            btn.addEventListener("click", function () {
              expanded = !expanded;
              sidebar.querySelectorAll(".collapse").forEach(function (el) {
                el.classList.toggle("show", expanded);
                var id = el.id;
                if (id) {
                  var trigger = sidebar.querySelector('[data-bs-target="#' + id + '"]');
                  if (trigger) trigger.setAttribute("aria-expanded", String(expanded));
                }
              });
              btn.textContent = expanded ? "\u25b2 Alle einklappen" : "\u25bc Alle ausklappen";
            });
            navContainer.appendChild(btn);
          });
          </script>

filters:
  - quizdown

execute:
  eval: false
  echo: true
  warning: false
  freeze: auto
